root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/backend ./cmd/api"
entrypoint = ["./tmp/backend"]
include_ext = ["go", "tpl", "tmpl", "html", "yml", "yaml", "toml", "env"]
exclude_dir = ["tmp", "vendor"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[misc]
clean_on_exit = true
