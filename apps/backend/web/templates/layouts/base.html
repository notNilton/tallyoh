{{ define "base" }}
<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — Personalledger</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 500: '#6366f1', 600: '#4f46e5' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b' }
          }
        }
      }
    }
  </script>
  <style>
    [data-privacy="true"] .privacy-amount { filter: blur(6px); user-select: none; }
  </style>
</head>
<body class="h-full bg-surface-50 text-surface-800 font-sans antialiased" data-privacy="false" id="body-root">

  {{ if not .HideNav }}
  <nav class="sticky top-0 z-50 border-b border-surface-200 bg-white/90 backdrop-blur">
    <div class="mx-auto max-w-5xl px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary-600 text-white font-bold text-sm">PL</div>
        <span class="font-semibold text-lg tracking-tight">Personalledger</span>
      </a>
      {{ if .User }}
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">{{ .User.Name }}</span>
        <form action="/logout" method="POST" class="inline">
          <button type="submit" class="text-sm text-gray-500 hover:text-red-600" title="Sair">Sair</button>
        </form>
      </div>
      {{ end }}
    </div>
  </nav>
  {{ end }}

  <main id="main-content" class="min-h-full">
    {{ template "content" . }}
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
{{ end }}
