info:
  name: Maintenances
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/v1/vehicles/{{vehicleId}}/maintenances"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
