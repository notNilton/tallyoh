info:
  name: GetMe
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/users/me"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
