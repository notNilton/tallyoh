info:
  name: DeleteTransfer
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/transfers/{{transferId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
