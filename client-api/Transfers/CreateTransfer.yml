info:
  name: CreateTransfer
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/transfers"
  body:
    type: json
    data: |-
      {
        "fromAccountId": "{{accountId}}",
        "toAccountId": "{{toAccountId}}",
        "amount": 500.00,
        "date": "2025-01-15",
        "description": "Transferência entre contas"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          bru.setEnvVar("transferId", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
