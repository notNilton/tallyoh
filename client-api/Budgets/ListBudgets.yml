info:
  name: ListBudgets
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/budgets?month=2025-01"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
