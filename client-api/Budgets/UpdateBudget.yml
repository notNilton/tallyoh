info:
  name: UpdateBudget
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/budgets/{{budgetId}}"
  body:
    type: json
    data: |-
      {
        "amount": 1200.00,
        "notes": "Ajustado para janeiro"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
