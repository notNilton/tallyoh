info:
  name: UpdateBudget
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/budgets/{{budgetId}}"
  body:
    type: json
    data: |-
      {
        "name": "Orçamento Março 2025 (ajustado)",
        "targetDate": "2025-03-01",
        "notes": "Ajustado após revisão",
        "items": [
          {
            "name": "Alimentação",
            "categoryId": "{{categoryId}}",
            "sortOrder": 0
          }
        ]
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
