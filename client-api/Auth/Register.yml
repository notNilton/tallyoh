info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  auth: none
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}",
        "name": "Nilton Santos"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 || res.status === 201) {
          bru.setEnvVar("accessToken", res.body.accessToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
