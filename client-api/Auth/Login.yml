info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 || res.status === 201) {
          bru.setEnvVar("accessToken", res.body.sessionToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
