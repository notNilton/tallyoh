info:
  name: RevokeMember
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/accounts/{{accountId}}/members/{{memberId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
