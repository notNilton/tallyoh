info:
  name: UpdateAccount
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/accounts/{{accountId}}"
  body:
    type: json
    data: |-
      {
        "name": "Conta Atualizada",
        "balance": 2000.00
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
