info:
  name: CreateAccount
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/accounts"
  body:
    type: json
    data: |-
      {
        "name": "Conta Corrente Nubank",
        "type": "CHECKING",
        "bankName": "Nubank",
        "balance": 1500.50,
        "color": "#8A05BE"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
