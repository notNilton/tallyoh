info:
  name: UpdateCategory
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/categories/{{categoryId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "name": "Alimentação Atualizada",
        "color": "#E53935"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
