info:
  name: GetTag
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/v1/tags/{{tagId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
