info:
  name: UpdateTag
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/tags/{{tagId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "name": "Urgente Atualizado",
        "color": "#FF5722"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
