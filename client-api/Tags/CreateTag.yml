info:
  name: CreateTag
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/tags"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "name": "Urgente",
        "color": "#F44336"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
