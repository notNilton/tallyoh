info:
  name: ChangePassword
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/settings/change-password"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "currentPassword": "password123",
        "newPassword": "newpassword123"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
