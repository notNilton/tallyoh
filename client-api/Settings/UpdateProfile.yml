info:
  name: UpdateProfile
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/settings/profile"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "name": "Nilton Santos",
        "phone": "11988887777"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
