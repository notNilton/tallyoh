info:
  name: CreateTransaction
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/transactions"
  body:
    type: json
    data: |-
      {
        "categoryId": "{{categoryId}}",
        "type": "EXPENSE",
        "amount": 45.90,
        "description": "Supermercado",
        "date": "2024-03-29T10:00:00Z",
        "status": "COMPLETED",
        "paymentMethod": "DEBIT",
        "channel": "PIX"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
