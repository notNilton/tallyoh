info:
  name: CreateCard
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/cards"
  body:
    type: json
    data: |-
      {
        "accountId": "{{accountId}}",
        "name": "Cartão de Crédito",
        "brand": "Visa",
        "type": "CREDIT",
        "creditLimit": 5000.00
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
