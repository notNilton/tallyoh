name: Pull Request
run-name: PR - ${{ gitea.actor }}

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: basic
    outputs:
      APP_CHANGED: ${{ steps.detect.outputs.APP_CHANGED }}
      DOC_CHANGED: ${{ steps.detect.outputs.DOC_CHANGED }}
      WEB_CHANGED: ${{ steps.detect.outputs.WEB_CHANGED }}
      ANY_CHANGED: ${{ steps.detect.outputs.ANY_CHANGED }}
      FORCE_ALL: ${{ steps.detect.outputs.FORCE_ALL }}
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changed areas
        id: detect
        run: |
          git fetch origin main
          BASE_REF=$(git merge-base HEAD origin/main)
          CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD)

          APP_CHANGED=false
          DOC_CHANGED=false
          WEB_CHANGED=false
          FORCE_ALL=false

          if echo "$CHANGED_FILES" | grep -q '^.gitea/workflows/'; then
            FORCE_ALL=true
          fi

          if [ "$FORCE_ALL" != "true" ] && echo "$CHANGED_FILES" | grep -Eq '^apps/backend/'; then
            APP_CHANGED=true
          fi

          if [ "$FORCE_ALL" != "true" ] && echo "$CHANGED_FILES" | grep -q '^apps/doc/'; then
            DOC_CHANGED=true
          fi

          if [ "$FORCE_ALL" != "true" ] && echo "$CHANGED_FILES" | grep -q '^apps/web/'; then
            WEB_CHANGED=true
          fi

          ANY_CHANGED=false
          if [ "$APP_CHANGED" = "true" ] || [ "$DOC_CHANGED" = "true" ] || [ "$WEB_CHANGED" = "true" ]; then
            ANY_CHANGED=true
          fi

          {
            echo "APP_CHANGED=$APP_CHANGED"
            echo "DOC_CHANGED=$DOC_CHANGED"
            echo "WEB_CHANGED=$WEB_CHANGED"
            echo "ANY_CHANGED=$ANY_CHANGED"
            echo "FORCE_ALL=$FORCE_ALL"
          } >> "$GITHUB_OUTPUT"

  build-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.APP_CHANGED == 'true' || needs.detect-changes.outputs.FORCE_ALL == 'true'
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build app
        working-directory: apps/backend
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: go build -mod=vendor ./...

  build-doc:
    needs: detect-changes
    if: needs.detect-changes.outputs.DOC_CHANGED == 'true' || needs.detect-changes.outputs.FORCE_ALL == 'true'
    runs-on: basic
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Validate openapi.yml
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('apps/doc/openapi.yml')); print('openapi.yml válido')"

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.WEB_CHANGED == 'true' || needs.detect-changes.outputs.FORCE_ALL == 'true'
    runs-on: basic
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build web image
        run: |
          docker build -f apps/web/Dockerfile -t web-ci-check apps/web/

  validate-compose:
    needs: detect-changes
    if: needs.detect-changes.outputs.ANY_CHANGED == 'true'
    runs-on: basic
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Validate docker-compose.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml válido"
