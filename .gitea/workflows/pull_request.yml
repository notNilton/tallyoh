name: Pull Request
run-name: PR - ${{ gitea.actor }}

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: basic
    outputs:
      BACKEND_CHANGED: ${{ steps.detect.outputs.BACKEND_CHANGED }}
      DATABASE_CHANGED: ${{ steps.detect.outputs.DATABASE_CHANGED }}
      ANY_CHANGED: ${{ steps.detect.outputs.ANY_CHANGED }}
      FORCE_ALL: ${{ steps.detect.outputs.FORCE_ALL }}
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changed areas
        id: detect
        run: |
          git fetch origin main
          BASE_REF=$(git merge-base HEAD origin/main)
          CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD)

          BACKEND_CHANGED=false
          DATABASE_CHANGED=false
          FORCE_ALL=false

          if echo "$CHANGED_FILES" | grep -q '^.gitea/workflows/'; then
            FORCE_ALL=true
          fi

          if [ "$FORCE_ALL" != "true" ] && echo "$CHANGED_FILES" | grep -Eq '^(apps/backend/|database/.*\.go$|database/go\.mod$|database/go\.sum$)'; then
            BACKEND_CHANGED=true
          fi

          if [ "$FORCE_ALL" != "true" ] && echo "$CHANGED_FILES" | grep -q '^database/'; then
            DATABASE_CHANGED=true
          fi

          ANY_CHANGED=false
          if [ "$BACKEND_CHANGED" = "true" ] || [ "$DATABASE_CHANGED" = "true" ]; then
            ANY_CHANGED=true
          fi

          {
            echo "BACKEND_CHANGED=$BACKEND_CHANGED"
            echo "DATABASE_CHANGED=$DATABASE_CHANGED"
            echo "ANY_CHANGED=$ANY_CHANGED"
            echo "FORCE_ALL=$FORCE_ALL"
          } >> "$GITHUB_OUTPUT"

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.BACKEND_CHANGED == 'true' || needs.detect-changes.outputs.FORCE_ALL == 'true'
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build binaries
        working-directory: apps/backend
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: go build -mod=vendor ./...

  build-database:
    needs: detect-changes
    if: needs.detect-changes.outputs.DATABASE_CHANGED == 'true' || needs.detect-changes.outputs.FORCE_ALL == 'true'
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build migrate binary
        working-directory: database
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: go build -mod=vendor ./...

  validate-compose:
    needs: detect-changes
    if: needs.detect-changes.outputs.ANY_CHANGED == 'true'
    runs-on: basic
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.TOKEN_COMPLETE }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Validate docker-compose.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.yml config --quiet
          echo "âś… docker-compose.yml vĂˇlido"
