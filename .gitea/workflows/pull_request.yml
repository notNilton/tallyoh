name: Pull Request
run-name: PR - ${{ gitea.actor }}

on:
  pull_request:
  workflow_dispatch:

jobs:
  # ========================================================
  # Build e teste do backend (compilação)
  # ========================================================
  build-backend:
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build binaries
        working-directory: apps/backend
        env:
          GOWORK: "off"
        run: go build -mod=vendor ./...

  # ========================================================
  # Build da webapp (npm)
  # ========================================================
  build-webapp:
    runs-on: typescript
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build Webapp
        working-directory: apps/webapp
        run: |
          npm ci
          npm run build
          echo "✅ Webapp build successful"

  # ========================================================
  # Valida arquivos docker-compose
  # ========================================================
  validate-compose:
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Validate docker-compose.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml válido"
