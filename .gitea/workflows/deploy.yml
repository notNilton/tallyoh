name: Deploy Mirante (Main)
run-name: Deploy Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Release — git tag puro, sem commit no main
  # ========================================================
  release-backend:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Tag Backend Release
        id: version
        run: |
          LATEST=$(git tag --list 'backend-v*' --sort=-v:refname | grep -E '^backend-v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then LATEST="backend-v0.0.0"; fi
          VERSION=${LATEST#backend-v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          git tag -a "backend-v${NEW_VERSION}" -m "chore(backend): release backend-v${NEW_VERSION} [skip ci]"
          git push origin "backend-v${NEW_VERSION}"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

  release-webapp:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Tag Webapp Release
        id: version
        run: |
          LATEST=$(git tag --list 'webapp-v*' --sort=-v:refname | grep -E '^webapp-v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then LATEST="webapp-v0.0.0"; fi
          VERSION=${LATEST#webapp-v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          git tag -a "webapp-v${NEW_VERSION}" -m "chore(webapp): release webapp-v${NEW_VERSION} [skip ci]"
          git push origin "webapp-v${NEW_VERSION}"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

  # ========================================================
  # 2. Build & Push (paralelos, sem banco)
  # ========================================================
  build-backend:
    needs: [release-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          build-args: |
            BUILD_VERSION=${{ needs.release-backend.outputs.VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.release-backend.outputs.VERSION }}

  build-webapp:
    needs: [release-webapp]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Webapp image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/webapp/Dockerfile
          build-args: |
            VITE_API_URL=https://mirante-api.nilbyte.com.br
            VITE_APP_VERSION=${{ needs.release-webapp.outputs.VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.release-webapp.outputs.VERSION }}
