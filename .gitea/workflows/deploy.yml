name: Deploy Mirante (Main)
run-name: Deploy Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Release Jobs (Sequenciais para evitar conflito de push)
  # ========================================================
  release-backend:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Release Backend
        id: version
        run: |
          npx standard-version --path apps/backend --tag-prefix backend-v --skip.changelog --message "chore(backend): release %s [skip ci]"
          git push --follow-tags origin HEAD:main
          VERSION=$(node -p "require('./apps/backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  release-webapp:
    needs: [release-backend]
    if: always() && needs.release-backend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Pull latest changes
        run: git pull origin main

      - name: Release Webapp
        id: version
        run: |
          npx standard-version --path apps/webapp --tag-prefix webapp-v --skip.changelog --message "chore(webapp): release %s [skip ci]"
          git push --follow-tags origin HEAD:main
          VERSION=$(node -p "require('./apps/webapp/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  # ========================================================
  # 2. Build & Push (Parallel)
  # ========================================================
  build-backend:
    needs: [release-backend]
    if: always() && needs.release-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          build-args: |
            BUILD_VERSION=${{ needs.release-backend.outputs.VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.release-backend.outputs.VERSION }}

  build-webapp:
    needs: [release-webapp]
    if: always() && needs.release-webapp.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Webapp image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/webapp/Dockerfile
          build-args: |
            VITE_API_URL=https://mirante-api.nilbyte.com.br
            VITE_APP_VERSION=${{ needs.release-webapp.outputs.VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.release-webapp.outputs.VERSION }}
