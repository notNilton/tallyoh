name: On Dev
run-name: On Dev - ${{ gitea.actor }}

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  # ========================================================
  # Build e teste do backend (compilação + imagem Docker)
  # ========================================================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Setup Go
        run: |
          ln -sf /usr/local/go/bin/go /usr/local/bin/go
          go version

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Build binaries
        working-directory: apps/backend
        run: go build ./...

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Build Backend image (validation only)
        run: |
          docker build -f apps/backend/Dockerfile -t mirante-backend:dev-test .
          echo "✅ Backend build successful"

  # ========================================================
  # Build da webapp (imagem Docker)
  # ========================================================
  build-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Build Webapp image (validation only)
        run: |
          docker build -f apps/webapp/Dockerfile \
            -t mirante-webapp:dev-test .
          echo "✅ Webapp build successful"

  # ========================================================
  # Valida arquivos docker-compose
  # ========================================================
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Validate docker-compose.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml válido"

      - name: Validate docker-compose.prod.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.prod.yml config --quiet
          echo "✅ docker-compose.prod.yml válido"
