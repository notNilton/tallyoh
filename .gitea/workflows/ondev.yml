name: On Dev
run-name: On Dev - ${{ gitea.actor }}

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      BACKEND_CHANGED: ${{ steps.check.outputs.BACKEND_CHANGED }}
      WEBAPP_CHANGED: ${{ steps.check.outputs.WEBAPP_CHANGED }}
      MIGRATIONS_CHANGED: ${{ steps.check.outputs.MIGRATIONS_CHANGED }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: check
        run: |
          if git diff HEAD~1 HEAD -- apps/backend/ database/migrations/ | grep -q .; then
            echo "BACKEND_CHANGED=true" >> $GITHUB_OUTPUT
            echo "✅ Backend changes detected"
          else
            echo "BACKEND_CHANGED=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Backend changes"
          fi

          if git diff HEAD~1 HEAD -- apps/webapp/ | grep -q .; then
            echo "WEBAPP_CHANGED=true" >> $GITHUB_OUTPUT
            echo "✅ Webapp changes detected"
          else
            echo "WEBAPP_CHANGED=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Webapp changes"
          fi

          if git diff HEAD~1 HEAD -- database/migrations/ | grep -q .; then
            echo "MIGRATIONS_CHANGED=true" >> $GITHUB_OUTPUT
            echo "✅ Migration changes detected"
          else
            echo "MIGRATIONS_CHANGED=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Migration changes"
          fi

  # ========================================================
  # Build e teste do backend (compilação + imagem)
  # ========================================================
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.BACKEND_CHANGED == 'true' || needs.detect-changes.outputs.MIGRATIONS_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Build binaries
        working-directory: apps/backend
        run: go build ./...

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Build Backend image (validation only)
        run: |
          docker build -f apps/backend/Dockerfile -t mirante-backend:dev-test .
          echo "✅ Backend build successful"

  # ========================================================
  # Build da webapp (imagem)
  # ========================================================
  build-webapp:
    needs: detect-changes
    if: needs.detect-changes.outputs.WEBAPP_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Build Webapp image (validation only)
        run: |
          docker build -f apps/webapp/Dockerfile \
            -t mirante-webapp:dev-test .
          echo "✅ Webapp build successful"
