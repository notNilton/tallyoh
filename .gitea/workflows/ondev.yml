name: On Dev
run-name: On Dev - ${{ gitea.actor }}

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  # ========================================================
  # Build e teste do backend (compilação)
  # ========================================================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Setup Go
        run: |
          for GO_DIR in /opt/hostedtoolcache/go/*/x64/bin /usr/local/go/bin /usr/bin /usr/local/bin /snap/bin; do
            if [ -x "${GO_DIR}/go" ]; then
              echo "${GO_DIR}" >> $GITHUB_PATH
              export PATH="${GO_DIR}:$PATH"
              echo "Found Go at ${GO_DIR}/go"
              go version
              exit 0
            fi
          done
          echo "ERROR: go not found, searching..."
          find / -maxdepth 8 -name go -type f 2>/dev/null | head -10 || true
          exit 1

      - name: Download dependencies
        working-directory: apps/backend
        env:
          GONOSUMDB: "*"
          GOWORK: "off"
        run: go mod download

      - name: Build binaries
        working-directory: apps/backend
        env:
          GONOSUMDB: "*"
          GOWORK: "off"
        run: go build ./...

  # ========================================================
  # Build da webapp (npm)
  # ========================================================
  build-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build Webapp
        working-directory: apps/webapp
        run: |
          npm ci
          npm run build
          echo "✅ Webapp build successful"

  # ========================================================
  # Valida arquivos docker-compose
  # ========================================================
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Validate docker-compose.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml válido"

      - name: Validate docker-compose.prod.yml
        run: |
          JWT_SECRET=ci-dummy-secret \
          DATABASE_URL=postgres://ci:ci@localhost:5432/ci \
          docker compose -f docker-compose.prod.yml config --quiet
          echo "✅ docker-compose.prod.yml válido"
