name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: go
    outputs:
      BACKEND_CHANGED: ${{ steps.detect.outputs.BACKEND_CHANGED }}
      DATABASE_CHANGED: ${{ steps.detect.outputs.DATABASE_CHANGED }}
      WEBAPP_CHANGED: ${{ steps.detect.outputs.WEBAPP_CHANGED }}
      ANY_CHANGED: ${{ steps.detect.outputs.ANY_CHANGED }}
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changed areas
        id: detect
        run: |
          BASE_REF=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE_REF="HEAD^"
          else
            BASE_REF="HEAD"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD)

          BACKEND_CHANGED=false
          DATABASE_CHANGED=false
          WEBAPP_CHANGED=false

          if echo "$CHANGED_FILES" | grep -Eq '^(apps/backend/|database/.*\.go$|database/go\.mod$|database/go\.sum$)'; then
            BACKEND_CHANGED=true
          fi

          if echo "$CHANGED_FILES" | grep -q '^database/'; then
            DATABASE_CHANGED=true
          fi

          if echo "$CHANGED_FILES" | grep -q '^apps/webapp/'; then
            WEBAPP_CHANGED=true
          fi

          ANY_CHANGED=false
          if [ "$BACKEND_CHANGED" = "true" ] || [ "$DATABASE_CHANGED" = "true" ] || [ "$WEBAPP_CHANGED" = "true" ]; then
            ANY_CHANGED=true
          fi

          {
            echo "BACKEND_CHANGED=$BACKEND_CHANGED"
            echo "DATABASE_CHANGED=$DATABASE_CHANGED"
            echo "WEBAPP_CHANGED=$WEBAPP_CHANGED"
            echo "ANY_CHANGED=$ANY_CHANGED"
          } >> "$GITHUB_OUTPUT"

  bump-versions:
    needs: detect-changes
    if: needs.detect-changes.outputs.BACKEND_CHANGED == 'true' || needs.detect-changes.outputs.WEBAPP_CHANGED == 'true'
    runs-on: typescript
    outputs:
      BACKEND_VERSION: ${{ steps.bump.outputs.BACKEND_VERSION }}
      WEBAPP_VERSION: ${{ steps.bump.outputs.WEBAPP_VERSION }}
      BACKEND_CHANGED: ${{ needs.detect-changes.outputs.BACKEND_CHANGED }}
      WEBAPP_CHANGED: ${{ needs.detect-changes.outputs.WEBAPP_CHANGED }}
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Configure Git
        run: |
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

      - name: Bump versions, commit and tag
        id: bump
        env:
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.BACKEND_CHANGED }}
          WEBAPP_CHANGED: ${{ needs.detect-changes.outputs.WEBAPP_CHANGED }}
        run: |
          FILES_CHANGED=""

          CURRENT_BE=$(cat apps/backend/VERSION)
          BACKEND_NEW="$CURRENT_BE"
          if [ "$BACKEND_CHANGED" = "true" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_BE"
            PATCH=$((PATCH + 1))
            BACKEND_NEW="${MAJOR}.${MINOR}.${PATCH}"
            echo "$BACKEND_NEW" > apps/backend/VERSION
            git add apps/backend/VERSION
            FILES_CHANGED="$FILES_CHANGED backend-v${BACKEND_NEW}"
          fi
          echo "BACKEND_VERSION=$BACKEND_NEW" >> "$GITHUB_OUTPUT"

          CURRENT_WEBAPP=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('apps/webapp/package.json', 'utf8')); console.log(pkg.version);")
          WEBAPP_NEW="$CURRENT_WEBAPP"
          if [ "$WEBAPP_CHANGED" = "true" ]; then
            WEBAPP_NEW=$(node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('apps/webapp/package.json', 'utf8'));
              const parts = pkg.version.split('.');
              parts[2] = parseInt(parts[2], 10) + 1;
              const next = parts.join('.');
              pkg.version = next;
              fs.writeFileSync('apps/webapp/package.json', JSON.stringify(pkg, null, 2) + '\\n');
              console.log(next);
            ")
            git add apps/webapp/package.json
            FILES_CHANGED="$FILES_CHANGED webapp-v${WEBAPP_NEW}"
          fi
          echo "WEBAPP_VERSION=$WEBAPP_NEW" >> "$GITHUB_OUTPUT"

          if [ -z "$FILES_CHANGED" ]; then
            echo "No versioned components changed."
            exit 0
          fi

          PUSH_URL=$(echo "${{ gitea.server_url }}/${{ gitea.repository }}.git" | sed "s|://|://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@|")

          git commit -m "chore: bump versions $FILES_CHANGED [skip ci]"

          git fetch "$PUSH_URL" main
          git rebase FETCH_HEAD

          git push "$PUSH_URL" HEAD:main

          if [ "$BACKEND_CHANGED" = "true" ]; then
            git tag -a "backend-v${BACKEND_NEW}" -m "backend-v${BACKEND_NEW}"
            git push "$PUSH_URL" "backend-v${BACKEND_NEW}"
          fi

          if [ "$WEBAPP_CHANGED" = "true" ]; then
            git tag -a "webapp-v${WEBAPP_NEW}" -m "webapp-v${WEBAPP_NEW}"
            git push "$PUSH_URL" "webapp-v${WEBAPP_NEW}"
          fi

  build-backend:
    needs: bump-versions
    if: needs.bump-versions.outputs.BACKEND_CHANGED == 'true'
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build binary
        working-directory: apps/backend
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor \
            -ldflags "-X github.com/nilbyte/mirante/backend/internal/version.Version=${{ needs.bump-versions.outputs.BACKEND_VERSION }}" \
            -o main ./cmd/api

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=nilbyte/mirante" >> "$GITHUB_ENV"

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin

      - name: Warm Docker cache
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest" || true

      - name: Build and push Backend image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest" \
            -f apps/backend/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}"

  build-database:
    needs: detect-changes
    if: needs.detect-changes.outputs.DATABASE_CHANGED == 'true'
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build migrate binary
        working-directory: database
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -o migrate ./cmd/migrate

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=nilbyte/mirante" >> "$GITHUB_ENV"

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin

      - name: Warm Docker cache
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest" || true

      - name: Build and push Database/Migrate image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest" \
            -f database/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest"

  build-webapp:
    needs: bump-versions
    if: needs.bump-versions.outputs.WEBAPP_CHANGED == 'true'
    runs-on: typescript
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build Webapp
        working-directory: apps/webapp
        env:
          NPM_CONFIG_CACHE: /tmp/npm-cache
        run: |
          npm ci --cache "$NPM_CONFIG_CACHE" --prefer-offline
          VITE_API_URL=https://api-mirante.nilbyte.com.br \
          VITE_APP_VERSION=${{ needs.bump-versions.outputs.WEBAPP_VERSION }} \
          npm run build

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=nilbyte/mirante" >> "$GITHUB_ENV"

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin

      - name: Warm Docker cache
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest" || true

      - name: Build and push Webapp image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest" \
            -f apps/webapp/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}"

  deploy:
    needs: [detect-changes, build-backend, build-database, build-webapp]
    if: needs.detect-changes.outputs.ANY_CHANGED == 'true'
    runs-on: go
    steps:
      - name: Install SSH client
        run: |
          if ! command -v ssh &> /dev/null; then
            if command -v apk &> /dev/null; then
              apk add --no-cache openssh-client
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y openssh-client
            fi
          fi

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /srv/nilbyte/infrastructure &&
            sed -i "s#nilbyte-studios/mirante#nilbyte/mirante#g" apps/infra/mirante/docker-compose.backend.yml apps/infra/mirante/docker-compose.webapp.yml &&
            docker compose -f apps/infra/mirante/docker-compose.backend.yml -f apps/infra/mirante/docker-compose.webapp.yml pull &&
            docker compose -f apps/infra/mirante/docker-compose.backend.yml -f apps/infra/mirante/docker-compose.webapp.yml up -d
          '
