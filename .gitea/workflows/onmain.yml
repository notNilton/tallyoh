name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: runner
    env:
      REGISTRY: "gitea.nilbyte.com.br"
      IMAGE_NAMESPACE: "nilbyte/tallyoh"
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          BACKEND_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            BACKEND_CHANGED=true
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(apps/backend/|database/.*\.go$|database/go\.mod$|database/go\.sum$|.gitea/workflows/)'; then
                BACKEND_CHANGED=true
              fi
            else
              BACKEND_CHANGED=true
            fi
          fi
          echo "BACKEND_CHANGED=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Login to Gitea registry
        if: steps.check.outputs.BACKEND_CHANGED == 'true'
        run: |
          echo "${{ secrets.TOKEN_COMPLETE }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push Backend image
        if: steps.check.outputs.BACKEND_CHANGED == 'true'
        run: |
          VERSION=$(cat apps/backend/VERSION)
          docker build -f apps/backend/Dockerfile \
            --build-arg VERSION=${VERSION} \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${VERSION}" \
            .
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${VERSION}"

  update-database:
    runs-on: runner
    env:
      REGISTRY: "gitea.nilbyte.com.br"
      IMAGE_NAMESPACE: "nilbyte/tallyoh"
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          DATABASE_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            DATABASE_CHANGED=true
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(database/|.gitea/workflows/)'; then
                DATABASE_CHANGED=true
              fi
            else
              DATABASE_CHANGED=true
            fi
          fi
          echo "DATABASE_CHANGED=$DATABASE_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Login to Gitea registry
        if: steps.check.outputs.DATABASE_CHANGED == 'true'
        run: |
          echo "${{ secrets.TOKEN_COMPLETE }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push Database image
        if: steps.check.outputs.DATABASE_CHANGED == 'true'
        run: |
          docker build -f database/Dockerfile \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/database:latest" \
            .
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/database:latest"

  build-webapp:
    runs-on: runner
    env:
      REGISTRY: "gitea.nilbyte.com.br"
      IMAGE_NAMESPACE: "nilbyte/tallyoh"
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          WEBAPP_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            WEBAPP_CHANGED=true
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(apps/webapp/|.gitea/workflows/)'; then
                WEBAPP_CHANGED=true
              fi
            else
              WEBAPP_CHANGED=true
            fi
          fi
          echo "WEBAPP_CHANGED=$WEBAPP_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Login to Gitea registry
        if: steps.check.outputs.WEBAPP_CHANGED == 'true'
        run: |
          echo "${{ secrets.TOKEN_COMPLETE }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push Webapp image
        if: steps.check.outputs.WEBAPP_CHANGED == 'true'
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/webapp/package.json | head -n1)
          docker build -f apps/webapp/Dockerfile \
            --build-arg VITE_API_URL= \
            --build-arg VITE_APP_VERSION=${VERSION} \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/webapp:latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/webapp:${VERSION}" \
            .
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/webapp:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/webapp:${VERSION}"

  deploy:
    needs: [build-backend, update-database, build-webapp]
    if: always() && (needs.build-backend.result == 'success' || needs.update-database.result == 'success' || needs.build-webapp.result == 'success')
    runs-on: runner
    steps:
      - name: Install SSH client
        run: |
          if ! command -v ssh &> /dev/null; then
            if command -v apk &> /dev/null; then
              apk add --no-cache openssh-client
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y openssh-client
            fi
          fi

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /srv/nilbyte/infrastructure &&
            docker compose -f apps/infra/tallyoh/docker-compose.backend.yml -f apps/infra/tallyoh/docker-compose.webapp.yml pull &&
            docker compose -f apps/infra/tallyoh/docker-compose.backend.yml -f apps/infra/tallyoh/docker-compose.webapp.yml up -d
          '

      - name: Bump versions for next release
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

          FILES_CHANGED=""

          # Backend bump
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            CURRENT_BE=$(cat apps/backend/VERSION)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_BE"
            PATCH=$((PATCH + 1))
            BE_NEW="${MAJOR}.${MINOR}.${PATCH}"
            echo "$BE_NEW" > apps/backend/VERSION
            git add apps/backend/VERSION
            git tag -a "backend-v$CURRENT_BE" -m "backend-v$CURRENT_BE"
            FILES_CHANGED="$FILES_CHANGED backend"
          fi

          # Webapp bump
          if [ "${{ needs.build-webapp.result }}" = "success" ]; then
            CURRENT_WEB=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/webapp/package.json | head -n1)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_WEB"
            PATCH=$((PATCH + 1))
            WEB_NEW="${MAJOR}.${MINOR}.${PATCH}"
            sed -i "s/\"version\": \"$CURRENT_WEB\"/\"version\": \"$WEB_NEW\"/" apps/webapp/package.json
            git add apps/webapp/package.json
            git tag -a "webapp-v$CURRENT_WEB" -m "webapp-v$CURRENT_WEB"
            FILES_CHANGED="$FILES_CHANGED webapp"
          fi

          if [ -n "$FILES_CHANGED" ]; then
            PUSH_URL=$(echo "${{ gitea.server_url }}/${{ gitea.repository }}.git" | sed "s|://|://oauth2:${{ secrets.TOKEN_COMPLETE }}@|")
            git commit -m "chore: bump versions after deploy ($FILES_CHANGED) [skip ci]"
            git push "$PUSH_URL" main --tags
          fi
