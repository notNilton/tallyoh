name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-app:
    runs-on: runner
    env:
      REGISTRY: "gitea.nilbyte.com.br"
      IMAGE_NAMESPACE: "nilbyte/tallyoh"
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          APP_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            APP_CHANGED=true
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(apps/backend/|.gitea/workflows/)'; then
                APP_CHANGED=true
              fi
            else
              APP_CHANGED=true
            fi
          fi
          echo "APP_CHANGED=$APP_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Login to Gitea registry
        if: steps.check.outputs.APP_CHANGED == 'true'
        run: |
          echo "${{ secrets.TOKEN_COMPLETE }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push App image
        if: steps.check.outputs.APP_CHANGED == 'true'
        run: |
          VERSION=$(cat apps/backend/VERSION)
          docker build -f apps/backend/Dockerfile \
            --build-arg VERSION=${VERSION} \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/app:latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/app:${VERSION}" \
            .
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/app:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/app:${VERSION}"

  build-doc:
    runs-on: runner
    env:
      REGISTRY: "gitea.nilbyte.com.br"
      IMAGE_NAMESPACE: "nilbyte/tallyoh"
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          DOC_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            DOC_CHANGED=true
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(apps/doc/|.gitea/workflows/)'; then
                DOC_CHANGED=true
              fi
            else
              DOC_CHANGED=true
            fi
          fi
          echo "DOC_CHANGED=$DOC_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Login to Gitea registry
        if: steps.check.outputs.DOC_CHANGED == 'true'
        run: |
          echo "${{ secrets.TOKEN_COMPLETE }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push Doc image
        if: steps.check.outputs.DOC_CHANGED == 'true'
        run: |
          docker build -f apps/doc/Dockerfile \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/doc:latest" \
            apps/doc/
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/doc:latest"

