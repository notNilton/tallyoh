name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Bumpa versões, commita e cria tags (sempre)
  # ========================================================
  bump-versions:
    runs-on: ubuntu-latest
    outputs:
      BACKEND_VERSION: ${{ steps.bump.outputs.BACKEND_VERSION }}
      WEBAPP_VERSION: ${{ steps.bump.outputs.WEBAPP_VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

      - name: Bump versions, commit and tag
        id: bump
        run: |
          FILES_CHANGED=""

          # Backend — sempre bump
          CURRENT=$(cat apps/backend/VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          BACKEND_NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$BACKEND_NEW" > apps/backend/VERSION
          git add apps/backend/VERSION
          FILES_CHANGED="$FILES_CHANGED backend-v${BACKEND_NEW}"
          echo "BACKEND_VERSION=$BACKEND_NEW" >> $GITHUB_OUTPUT

          # Webapp — sempre bump
          CURRENT=$(jq -r '.version' apps/webapp/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          WEBAPP_NEW="${MAJOR}.${MINOR}.${PATCH}"
          jq --arg v "$WEBAPP_NEW" '.version = $v' apps/webapp/package.json > /tmp/pkg.json
          mv /tmp/pkg.json apps/webapp/package.json
          git add apps/webapp/package.json
          FILES_CHANGED="$FILES_CHANGED webapp-v${WEBAPP_NEW}"
          echo "WEBAPP_VERSION=$WEBAPP_NEW" >> $GITHUB_OUTPUT

          git commit -m "chore: bump versions $FILES_CHANGED [skip ci]"
          git push origin HEAD:main

          git tag -a "backend-v${BACKEND_NEW}" -m "backend-v${BACKEND_NEW}"
          git push origin "backend-v${BACKEND_NEW}"

          git tag -a "webapp-v${WEBAPP_NEW}" -m "webapp-v${WEBAPP_NEW}"
          git push origin "webapp-v${WEBAPP_NEW}"

  # ========================================================
  # 2. Build & Push — sempre, paralelo
  # ========================================================
  build-backend:
    needs: bump-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Build binaries
        working-directory: apps/backend
        run: go build ./...

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          build-args: |
            BUILD_VERSION=${{ needs.bump-versions.outputs.BACKEND_VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}

  build-webapp:
    needs: bump-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Webapp image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/webapp/Dockerfile
          build-args: |
            VITE_API_URL=https://mirante-api.nilbyte.com.br
            VITE_APP_VERSION=${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
