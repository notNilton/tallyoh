name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Bumpa versões, commita e cria tags (sempre)
  # ========================================================
  bump-versions:
    runs-on: ubuntu-latest
    outputs:
      BACKEND_VERSION: ${{ steps.bump.outputs.BACKEND_VERSION }}
      WEBAPP_VERSION: ${{ steps.bump.outputs.WEBAPP_VERSION }}
    steps:
      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 gitea.nilbyte.com.br >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check out repository code
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            git clone --depth=0 \
            "ssh://git@gitea.nilbyte.com.br:2222/nilbyte-studios/mirante.git" .
          git checkout ${{ gitea.sha }}

      - name: Configure Git
        run: |
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

      - name: Bump versions, commit and tag
        id: bump
        run: |
          FILES_CHANGED=""

          # Backend — sempre bump
          CURRENT=$(cat apps/backend/VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          BACKEND_NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$BACKEND_NEW" > apps/backend/VERSION
          git add apps/backend/VERSION
          FILES_CHANGED="$FILES_CHANGED backend-v${BACKEND_NEW}"
          echo "BACKEND_VERSION=$BACKEND_NEW" >> $GITHUB_OUTPUT

          # Webapp — sempre bump
          CURRENT=$(jq -r '.version' apps/webapp/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          WEBAPP_NEW="${MAJOR}.${MINOR}.${PATCH}"
          jq --arg v "$WEBAPP_NEW" '.version = $v' apps/webapp/package.json > /tmp/pkg.json
          mv /tmp/pkg.json apps/webapp/package.json
          git add apps/webapp/package.json
          FILES_CHANGED="$FILES_CHANGED webapp-v${WEBAPP_NEW}"
          echo "WEBAPP_VERSION=$WEBAPP_NEW" >> $GITHUB_OUTPUT

          git commit -m "chore: bump versions $FILES_CHANGED [skip ci]"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            git push origin HEAD:main

          git tag -a "backend-v${BACKEND_NEW}" -m "backend-v${BACKEND_NEW}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            git push origin "backend-v${BACKEND_NEW}"

          git tag -a "webapp-v${WEBAPP_NEW}" -m "webapp-v${WEBAPP_NEW}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            git push origin "webapp-v${WEBAPP_NEW}"

  # ========================================================
  # 2. Build & Push — sempre, paralelo
  # ========================================================
  build-backend:
    needs: bump-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Setup Go
        run: |
          for GO_DIR in /usr/local/go/bin /usr/bin /usr/local/bin /snap/bin; do
            if [ -x "${GO_DIR}/go" ]; then
              echo "${GO_DIR}" >> $GITHUB_PATH
              export PATH="${GO_DIR}:$PATH"
              echo "Found Go at ${GO_DIR}/go"
              go version
              exit 0
            fi
          done
          echo "ERROR: go not found, searching..."
          find / -maxdepth 8 -name go -type f 2>/dev/null | head -10 || true
          exit 1

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Build binaries
        working-directory: apps/backend
        run: go build ./...

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        run: |
          echo "${{ secrets.PACKAGES_TOKEN }}" | \
            docker login gitea.nilbyte.com.br -u notNilton --password-stdin

      - name: Build and push Backend image
        run: |
          docker build -f apps/backend/Dockerfile \
            --build-arg BUILD_VERSION=${{ needs.bump-versions.outputs.BACKEND_VERSION }} \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }} \
            .
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}

  build-webapp:
    needs: bump-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        run: |
          echo "${{ secrets.PACKAGES_TOKEN }}" | \
            docker login gitea.nilbyte.com.br -u notNilton --password-stdin

      - name: Build and push Webapp image
        run: |
          docker build -f apps/webapp/Dockerfile \
            --build-arg VITE_API_URL=https://mirante-api.nilbyte.com.br \
            --build-arg VITE_APP_VERSION=${{ needs.bump-versions.outputs.WEBAPP_VERSION }} \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }} \
            .
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
