name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Detecta o que mudou
  # ========================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      BACKEND_CHANGED: ${{ steps.check.outputs.BACKEND_CHANGED }}
      WEBAPP_CHANGED: ${{ steps.check.outputs.WEBAPP_CHANGED }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed projects
        id: check
        run: |
          # go.work e .dockerignore na raiz afetam o build do backend
          if git diff HEAD~1 HEAD -- apps/backend/ database/migrations/ go.work go.work.sum .dockerignore | grep -q .; then
            echo "BACKEND_CHANGED=true" >> $GITHUB_OUTPUT
            echo "Backend changed"
          else
            echo "BACKEND_CHANGED=false" >> $GITHUB_OUTPUT
            echo "Backend unchanged"
          fi

          # .dockerignore na raiz afeta o build da webapp
          if git diff HEAD~1 HEAD -- apps/webapp/ .dockerignore | grep -q .; then
            echo "WEBAPP_CHANGED=true" >> $GITHUB_OUTPUT
            echo "Webapp changed"
          else
            echo "WEBAPP_CHANGED=false" >> $GITHUB_OUTPUT
            echo "Webapp unchanged"
          fi

  # ========================================================
  # 2. Bumpa versoes, commita e cria tags (job unico = sem conflito)
  # ========================================================
  bump-versions:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.BACKEND_CHANGED == 'true' || needs.detect-changes.outputs.WEBAPP_CHANGED == 'true'
    runs-on: ubuntu-latest
    outputs:
      BACKEND_VERSION: ${{ steps.bump.outputs.BACKEND_VERSION }}
      WEBAPP_VERSION: ${{ steps.bump.outputs.WEBAPP_VERSION }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

      - name: Bump versions, commit and tag
        id: bump
        run: |
          BACKEND_CHANGED="${{ needs.detect-changes.outputs.BACKEND_CHANGED }}"
          WEBAPP_CHANGED="${{ needs.detect-changes.outputs.WEBAPP_CHANGED }}"
          FILES_CHANGED=""

          if [ "$BACKEND_CHANGED" = "true" ]; then
            CURRENT=$(cat apps/backend/VERSION)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "$NEW_VERSION" > apps/backend/VERSION
            git add apps/backend/VERSION
            FILES_CHANGED="$FILES_CHANGED backend-v${NEW_VERSION}"
            echo "BACKEND_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "BACKEND_VERSION=$(cat apps/backend/VERSION)" >> $GITHUB_OUTPUT
          fi

          if [ "$WEBAPP_CHANGED" = "true" ]; then
            CURRENT=$(jq -r '.version' apps/webapp/package.json)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            jq --arg v "$NEW_VERSION" '.version = $v' apps/webapp/package.json > /tmp/pkg.json
            mv /tmp/pkg.json apps/webapp/package.json
            git add apps/webapp/package.json
            FILES_CHANGED="$FILES_CHANGED webapp-v${NEW_VERSION}"
            echo "WEBAPP_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "WEBAPP_VERSION=$(jq -r '.version' apps/webapp/package.json)" >> $GITHUB_OUTPUT
          fi

          if [ -n "$FILES_CHANGED" ]; then
            git commit -m "chore: bump versions${FILES_CHANGED} [skip ci]"
            git push origin HEAD:main
          fi

          if [ "$BACKEND_CHANGED" = "true" ]; then
            BV=$(cat apps/backend/VERSION)
            git tag -a "backend-v${BV}" -m "backend-v${BV}"
            git push origin "backend-v${BV}"
          fi

          if [ "$WEBAPP_CHANGED" = "true" ]; then
            WV=$(jq -r '.version' apps/webapp/package.json)
            git tag -a "webapp-v${WV}" -m "webapp-v${WV}"
            git push origin "webapp-v${WV}"
          fi

  # ========================================================
  # 3. Build & Push (paralelos)
  # ========================================================
  build-backend:
    needs: [detect-changes, bump-versions]
    if: needs.detect-changes.outputs.BACKEND_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          build-args: |
            BUILD_VERSION=${{ needs.bump-versions.outputs.BACKEND_VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}

  build-webapp:
    needs: [detect-changes, bump-versions]
    if: needs.detect-changes.outputs.WEBAPP_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: gitea.nilbyte.com.br
          username: notNilton
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push Webapp image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/webapp/Dockerfile
          build-args: |
            VITE_API_URL=https://mirante-api.nilbyte.com.br
            VITE_APP_VERSION=${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
          push: true
          tags: |
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
            gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
