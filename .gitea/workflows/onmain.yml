name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Bumpa versões, commita e cria tags (sempre)
  # ========================================================
  bump-versions:
    runs-on: typescript
    outputs:
      BACKEND_VERSION: ${{ steps.bump.outputs.BACKEND_VERSION }}
      WEBAPP_VERSION: ${{ steps.bump.outputs.WEBAPP_VERSION }}
    steps:
      - name: Check out repository code
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Configure Git
        run: |
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

      - name: Bump versions, commit and tag
        id: bump
        run: |
          FILES_CHANGED=""

          # Backend — sempre bump (txt puro)
          CURRENT_BE=$(cat apps/backend/VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_BE"
          PATCH=$((PATCH + 1))
          BACKEND_NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$BACKEND_NEW" > apps/backend/VERSION
          git add apps/backend/VERSION
          FILES_CHANGED="$FILES_CHANGED backend-v${BACKEND_NEW}"
          echo "BACKEND_VERSION=$BACKEND_NEW" >> $GITHUB_OUTPUT

          # Webapp — sempre bump (usando node já que estamos no runner de typescript)
          WEBAPP_NEW=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/webapp/package.json', 'utf8'));
            const parts = pkg.version.split('.');
            parts[2] = parseInt(parts[2]) + 1;
            const next = parts.join('.');
            pkg.version = next;
            fs.writeFileSync('apps/webapp/package.json', JSON.stringify(pkg, null, 2) + '\\n');
            console.log(next);
          ")
          git add apps/webapp/package.json
          FILES_CHANGED="$FILES_CHANGED webapp-v${WEBAPP_NEW}"
          echo "WEBAPP_VERSION=$WEBAPP_NEW" >> $GITHUB_OUTPUT

          PUSH_URL=$(echo "${{ gitea.server_url }}/${{ gitea.repository }}.git" | sed "s|://|://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@|")

          git commit -m "chore: bump versions $FILES_CHANGED [skip ci]"

          # Tenta atualizar antes de dar push para evitar conflitos concorrentes
          git fetch "$PUSH_URL" main
          git rebase FETCH_HEAD

          git push "$PUSH_URL" HEAD:main

          git tag -a "backend-v${BACKEND_NEW}" -m "backend-v${BACKEND_NEW}"
          git push "$PUSH_URL" "backend-v${BACKEND_NEW}"

          git tag -a "webapp-v${WEBAPP_NEW}" -m "webapp-v${WEBAPP_NEW}"
          git push "$PUSH_URL" "webapp-v${WEBAPP_NEW}"

  # ========================================================
  # 2. Build & Push — sempre, paralelo
  # ========================================================
  build-backend:
    needs: bump-versions
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build binary
        working-directory: apps/backend
        env:
          GOWORK: "off"
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor \
            -ldflags "-X github.com/nilbyte/mirante/backend/internal/version.Version=${{ needs.bump-versions.outputs.BACKEND_VERSION }}" \
            -o main ./cmd/api

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo ${{ gitea.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin
      - name: Build and push Backend image
        run: |
          docker build -f apps/backend/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }} \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:${{ needs.bump-versions.outputs.BACKEND_VERSION }}

  build-database:
    needs: bump-versions
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build migrate binary
        working-directory: database
        env:
          GOWORK: "off"
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -o migrate ./cmd/migrate

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo ${{ gitea.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin
      - name: Build and push Database/Migrate image
        run: |
          docker build -f database/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/database:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/database:latest

  build-webapp:
    needs: bump-versions
    runs-on: typescript
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch main \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build Webapp
        working-directory: apps/webapp
        run: |
          npm ci
          VITE_API_URL=https://api-mirante.nilbyte.com.br \
          VITE_APP_VERSION=${{ needs.bump-versions.outputs.WEBAPP_VERSION }} \
          npm run build

      - name: Login to Gitea registry
        run: |
          REGISTRY="gitea.nilbyte.com.br"
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo ${{ gitea.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "$REGISTRY" -u notNilton --password-stdin
      - name: Build and push Webapp image
        run: |
          docker build -f apps/webapp/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/webapp:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }} \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/webapp:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/webapp:${{ needs.bump-versions.outputs.WEBAPP_VERSION }}
