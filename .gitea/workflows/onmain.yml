name: On Main
run-name: On Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git clone --depth=1 --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          BACKEND_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            BACKEND_CHANGED=true
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED_FILES" | grep -Eq '^(apps/backend/|database/.*\.go$|database/go\.mod$|database/go\.sum$|.gitea/workflows/)'; then
              BACKEND_CHANGED=true
            fi
          fi
          echo "BACKEND_CHANGED=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Build binary
        if: steps.check.outputs.BACKEND_CHANGED == 'true'
        working-directory: apps/backend
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: |
          VERSION=$(cat VERSION)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor \
            -ldflags "-X github.com/nilbyte/mirante/backend/internal/version.Version=$VERSION" \
            -o main ./cmd/api

      - name: Login to Gitea registry
        if: steps.check.outputs.BACKEND_CHANGED == 'true'
        run: |
          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "gitea:3000" -u notNilton --password-stdin

      - name: Build and push Backend image
        if: steps.check.outputs.BACKEND_CHANGED == 'true'
        env:
          REGISTRY: "gitea:3000"
          IMAGE_NAMESPACE: "nilbyte/mirante"
        run: |
          VERSION=$(cat apps/backend/VERSION)
          docker build -f apps/backend/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/backend:${VERSION}" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/backend:latest"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/backend:${VERSION}"

  build-database:
    runs-on: go
    steps:
      - name: Check out repository code
        run: |
          git clone --depth=1 --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          DATABASE_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            DATABASE_CHANGED=true
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED_FILES" | grep -Eq '^(database/|.gitea/workflows/)'; then
              DATABASE_CHANGED=true
            fi
          fi
          echo "DATABASE_CHANGED=$DATABASE_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Build migrate binary
        if: steps.check.outputs.DATABASE_CHANGED == 'true'
        working-directory: database
        env:
          GOWORK: "off"
          GOCACHE: /tmp/go-build
          GOMODCACHE: /tmp/go-mod-cache
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -o migrate ./cmd/migrate

      - name: Login to Gitea registry
        if: steps.check.outputs.DATABASE_CHANGED == 'true'
        run: |
          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "gitea:3000" -u notNilton --password-stdin

      - name: Build and push Database/Migrate image
        if: steps.check.outputs.DATABASE_CHANGED == 'true'
        env:
          REGISTRY: "gitea:3000"
          IMAGE_NAMESPACE: "nilbyte/mirante"
        run: |
          docker build -f database/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/database:latest"

  build-webapp:
    runs-on: typescript
    steps:
      - name: Check out repository code
        run: |
          git clone --depth=1 --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Detect changes
        id: check
        run: |
          WEBAPP_CHANGED=false
          if [ "${{ gitea.event_name }}" = "workflow_dispatch" ]; then
            WEBAPP_CHANGED=true
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED_FILES" | grep -Eq '^(apps/webapp/|.gitea/workflows/)'; then
              WEBAPP_CHANGED=true
            fi
          fi
          echo "WEBAPP_CHANGED=$WEBAPP_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Build Webapp
        if: steps.check.outputs.WEBAPP_CHANGED == 'true'
        working-directory: apps/webapp
        env:
          NPM_CONFIG_CACHE: /tmp/npm-cache
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' package.json | head -n1)
          npm ci --cache "$NPM_CONFIG_CACHE" --prefer-offline
          VITE_API_URL=https://api.mirante.nilbyte.com.br \
          VITE_APP_VERSION=$VERSION \
          npm run build

      - name: Login to Gitea registry
        if: steps.check.outputs.WEBAPP_CHANGED == 'true'
        run: |
          echo "${{ secrets.REPO_COMPLETE_TOKEN }}" | docker login "gitea:3000" -u notNilton --password-stdin

      - name: Build and push Webapp image
        if: steps.check.outputs.WEBAPP_CHANGED == 'true'
        env:
          REGISTRY: "gitea:3000"
          IMAGE_NAMESPACE: "nilbyte/mirante"
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/webapp/package.json | head -n1)
          docker build -f apps/webapp/Dockerfile \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:${VERSION}" \
            .
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:latest"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/webapp:${VERSION}"

  deploy:
    needs: [build-backend, build-database, build-webapp]
    if: always() && (needs.build-backend.result == 'success' || needs.build-database.result == 'success' || needs.build-webapp.result == 'success')
    runs-on: basic
    steps:
      - name: Install SSH client
        run: |
          if ! command -v ssh &> /dev/null; then
            if command -v apk &> /dev/null; then
              apk add --no-cache openssh-client
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y openssh-client
            fi
          fi

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /srv/nilbyte/infrastructure &&
            docker compose -f apps/infra/mirante/docker-compose.backend.yml -f apps/infra/mirante/docker-compose.webapp.yml pull &&
            docker compose -f apps/infra/mirante/docker-compose.backend.yml -f apps/infra/mirante/docker-compose.webapp.yml up -d
          '

      - name: Bump versions for next release
        run: |
          git clone --branch main "${{ gitea.server_url }}/${{ gitea.repository }}.git" .
          git config user.name "CI Bot"
          git config user.email "bot@nilbyte.com"

          FILES_CHANGED=""

          # Backend bump
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            CURRENT_BE=$(cat apps/backend/VERSION)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_BE"
            PATCH=$((PATCH + 1))
            BE_NEW="${MAJOR}.${MINOR}.${PATCH}"
            echo "$BE_NEW" > apps/backend/VERSION
            git add apps/backend/VERSION
            git tag -a "backend-v$CURRENT_BE" -m "backend-v$CURRENT_BE"
            FILES_CHANGED="$FILES_CHANGED backend"
          fi

          # Webapp bump
          if [ "${{ needs.build-webapp.result }}" = "success" ]; then
            CURRENT_WEB=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/webapp/package.json | head -n1)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_WEB"
            PATCH=$((PATCH + 1))
            WEB_NEW="${MAJOR}.${MINOR}.${PATCH}"
            sed -i "s/\"version\": \"$CURRENT_WEB\"/\"version\": \"$WEB_NEW\"/" apps/webapp/package.json
            git add apps/webapp/package.json
            git tag -a "webapp-v$CURRENT_WEB" -m "webapp-v$CURRENT_WEB"
            FILES_CHANGED="$FILES_CHANGED webapp"
          fi

          if [ -n "$FILES_CHANGED" ]; then
            PUSH_URL=$(echo "${{ gitea.server_url }}/${{ gitea.repository }}.git" | sed "s|://|://oauth2:${{ secrets.REPO_COMPLETE_TOKEN }}@|")
            git commit -m "chore: bump versions after deploy ($FILES_CHANGED) [skip ci]"
            git push "$PUSH_URL" main --tags
          fi
