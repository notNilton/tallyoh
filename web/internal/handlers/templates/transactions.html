{{define "transactions"}}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tallyoh</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    /* ── Base ── */
    html, body { background: #f5f5f7; }
    body { max-width: 520px; margin: 0 auto; padding-bottom: 3rem; }

    /* ── Nav ── */
    .app-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 0 1rem; height: 52px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .brand { font-weight: 800; font-size: 1.15rem; letter-spacing: -0.5px; color: var(--pico-primary); text-decoration: none; }
    .nav-spacer { flex: 1; }
    .btn-logout {
      font-size: 0.78rem; padding: 0.3rem 0.75rem; margin: 0;
      border: 1px solid #e5e7eb; border-radius: 99px;
      background: none; cursor: pointer; color: #6b7280;
    }
    .btn-logout:hover { background: #f3f4f6; }

    /* ── Day groups ── */
    .day-list { padding: 0.75rem 0; }

    .day-group { margin-bottom: 0.25rem; }

    .day-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 0.5rem 1rem 0.3rem;
    }
    .day-label { font-size: 0.78rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    .day-net { font-size: 0.8rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .day-net.pos { color: #059669; }
    .day-net.neg { color: #dc2626; }

    /* ── Transaction card ── */
    .tx-card {
      background: #fff;
      margin: 0 0 1px;
    }
    .tx-card:first-of-type { border-radius: 10px 10px 0 0; }
    .tx-card:last-of-type  { border-radius: 0 0 10px 10px; }
    .tx-card:only-of-type  { border-radius: 10px; }

    .tx-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
    }

    .tx-icon {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; background: #e5e7eb;
    }
    .tx-icon.income     { background: #d1fae5; }
    .tx-icon.expense    { background: #fee2e2; }
    .tx-icon.investment { background: #e0e7ff; }
    .tx-icon.credit     { background: #fef9c3; }
    .tx-icon.return     { background: #ccfbf1; }

    .tx-body { flex: 1; min-width: 0; }
    .tx-desc { font-size: 0.9rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #111827; }
    .tx-meta { font-size: 0.75rem; color: #9ca3af; margin-top: 0.1rem; }

    .tx-end { display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; flex-shrink: 0; }
    .tx-amount { font-size: 0.88rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .tx-amount.income, .tx-amount.return     { color: #059669; }
    .tx-amount.expense                       { color: #dc2626; }
    .tx-amount.investment                    { color: #4338ca; }
    .tx-amount.credit                        { color: #d97706; }

    .tx-status { font-size: 0.68rem; font-weight: 600; padding: 0.1em 0.5em; border-radius: 99px; }
    .tx-status.pending   { background: #fef9c3; color: #854d0e; }
    .tx-status.canceled  { background: #f3f4f6; color: #6b7280; }

    .btn-del {
      opacity: 0; background: none; border: none; cursor: pointer;
      padding: 0.2rem 0.3rem; border-radius: 4px;
      color: #9ca3af; font-size: 0.78rem; line-height: 1;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .tx-card:hover .btn-del { opacity: 1; }
    .btn-del:hover { color: #dc2626; background: #fee2e2; }

    /* ── Add row ── */
    .add-row {
      background: #fff;
      border-radius: 0 0 10px 10px;
      border-top: 1px dashed #e5e7eb;
      overflow: hidden;
    }
    .day-group:has(.tx-card:only-of-type) .add-row,
    .day-group:not(:has(.tx-card)) .add-row {
      border-radius: 10px;
    }

    /* ── Quick-add type pills ── */
    .quick-add {
      display: flex; gap: 0.3rem; padding: 0.4rem 0.75rem; flex-wrap: wrap;
    }
    .qa-btn {
      padding: 0.2em 0.65em; border-radius: 999px;
      border: 1.5px solid #e5e7eb; background: none; cursor: pointer;
      font-size: 0.72rem; font-weight: 500; line-height: 1.5; color: #9ca3af;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
    }
    .qa-btn.qa-expense    { border-color: #fca5a5; color: #dc2626; }
    .qa-btn.qa-income     { border-color: #6ee7b7; color: #059669; }
    .qa-btn.qa-investment { border-color: #a5b4fc; color: #4338ca; }
    .qa-btn.qa-credit     { border-color: #fde68a; color: #d97706; }
    .qa-btn.qa-expense:hover    { background: #fee2e2; }
    .qa-btn.qa-income:hover     { background: #d1fae5; }
    .qa-btn.qa-investment:hover { background: #e0e7ff; }
    .qa-btn.qa-credit:hover     { background: #fef9c3; }

    /* ── Inline form slot ── */
    .form-slot { background: #fff; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 4rem 1rem; color: #9ca3af; }
    .empty-state p { margin: 0.15rem 0; font-size: 0.875rem; }
  </style>
</head>
<body>

<nav class="app-nav">
  <a class="brand" href="/transactions">tallyoh</a>
  <span class="nav-spacer"></span>
  <form method="POST" action="/logout" style="margin:0">
    <button class="btn-logout">Sair</button>
  </form>
</nav>

<div id="tx-list-wrap">
  {{template "transactions_rows" .}}
</div>

</body>
</html>
{{end}}
