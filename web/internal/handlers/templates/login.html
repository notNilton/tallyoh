{{define "login"}}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tallyoh - Entrar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; align-items: center; justify-content: center; background: var(--pico-background-color); }
    .login-card { width: 100%; max-width: 360px; padding: 2.5rem 2rem; border: 1px solid var(--pico-table-border-color); border-radius: 12px; background: var(--pico-card-background-color); box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .brand { text-align: center; font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: var(--pico-primary); margin: 0 0 0.25rem; }
    .tagline { text-align: center; color: var(--pico-muted-color); font-size: 0.85rem; margin: 0 0 2rem; }
    .error-msg { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 0.65rem 0.9rem; font-size: 0.875rem; margin-bottom: 1rem; }
    button[type=submit] { width: 100%; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="brand">tallyoh</h1>
    <p class="tagline">gestão financeira pessoal</p>
    {{if .Error}}
    <div class="error-msg">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/login">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus autocomplete="email">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="************" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
{{end}}
