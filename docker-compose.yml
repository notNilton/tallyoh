services:
  migrate:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: mirante-migrate
    restart: "no"
    environment:
      # A URL deve ser injetada pelo ambiente de deploy
      # Formato: postgresql://mirante:<senha>@nilbyte_postgres_prod:5432/mirante?sslmode=disable
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: api.mirante.nilbyte
    restart: always
    ports:
      - "3000:3000"
    environment:
      ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3400}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      migrate:
        condition: service_completed_successfully

  webapp:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
    container_name: mirante-webapp
    restart: always
    ports:
      - "3400:80"
    depends_on:
      - backend
