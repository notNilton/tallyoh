services:
  db:
    image: postgres:18-alpine
    container_name: mirante-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mirante}
    ports:
      - '5454:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mirante-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mirante}
      WEBAPP_URL: http://localhost:3400
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: mirante-webapp
    restart: always
    ports:
      - '3400:80'
    depends_on:
      - backend

volumes:
  postgres_data:
